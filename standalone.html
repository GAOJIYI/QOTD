    "theme": "私域运营",
    "html_body": "<h1>每日一个为什么 · 第 1 期</h1>\n\n<h2>问题</h2>\n\n<p><strong>为什么很多游戏在做私域的时候，加了几万好友、拉了几十个群，结果一分钱都赚不到？</strong></p>\n\n<hr/>\n\n<h2>答案</h2>\n\n<h3>一句话总结</h3>\n\n<blockquote><p>因为私域不是\"流量囤积\"而是\"关系经营\"——你把人拉进来不等于你能影响他们，更不等于他们愿意为你掏钱。</p></blockquote>\n\n<h3>先看一个真实场景</h3>\n\n<p>某款游戏运营团队雄心勃勃地搞私域：</p>\n\n<li>加了 <strong>5 万个玩家微信好友</strong></li>\n<li>拉了 <strong>40 多个微信群</strong></li>\n<li>每天在群里发活动公告、充值福利、版本更新</li>\n\n<p>看起来声势浩大，对吧？</p>\n\n<p>结果三个月下来：</p>\n\n<blockquote><p>月均私域转化收入：不到 2000 块。</p></blockquote>\n<blockquote><p>群活跃率：从 80% 掉到 5%。</p></blockquote>\n<blockquote><p>被拉黑 / 退群率：超过 60%。</p></blockquote>\n\n<p>运营团队崩溃了：\"我们明明这么努力，为什么玩家不买账？\"</p>\n\n<p>问题出在哪？四个层面。</p>\n\n<hr/>\n\n<h3>第一层：没筛选——来者不拒，等于谁都没服务好</h3>\n\n<p>很多游戏做私域的第一步就错了——<strong>把所有玩家都往里拉</strong>。</p>\n\n<p>新注册的、只玩了一天的、已经流失半年的、纯粹来白嫖的……全部塞进同一个群、用同一套话术。</p>\n\n<p>这就像一家餐厅：</p>\n\n<li>把米其林食客和路边摊常客放在一张桌子上</li>\n<li>用同样的菜单、同样的推销方式对待所有人</li>\n<li>结果是：高端客户觉得掉价跑了，低端客户觉得贵了也跑了</li>\n\n<p><strong>私域的本质不是\"人多\"，而是\"人对\"。</strong></p>\n\n<p>好的私域第一步应该是<strong>筛选</strong>：谁值得花时间深度服务？谁有付费潜力？谁只是凑热闹？</p>\n\n<table><thead><tr>\n<th>筛选维度</th>\n<th>高价值信号</th>\n<th>低价值信号</th>\n</tr></thead><tbody>\n<tr>\n<td>充值历史</td>\n<td>有过付费行为</td>\n<td>从未付费</td>\n</tr>\n<tr>\n<td>活跃度</td>\n<td>每日登录、参与活动</td>\n<td>注册后几乎不上线</td>\n</tr>\n<tr>\n<td>社交意愿</td>\n<td>主动加好友、进群</td>\n<td>被动、不回应</td>\n</tr>\n<tr>\n<td>内容偏好</td>\n<td>关注攻略/福利/社群</td>\n<td>只关心免费资源</td>\n</tr>\n</tbody></table>\n\n<p>不加筛选地拉人，最后的结果就是——<strong>群里全是\"僵尸\"，真正有价值的人被噪音淹没了</strong>。</p>\n\n<hr/>\n\n<h3>第二层：没信任——刚加上微信就开始推广告</h3>\n\n<p>这是最常见的翻车操作。</p>\n\n<p>玩家刚通过你的好友申请，还没聊两句，你就开始发：</p>\n\n<blockquote><p>\"亲，今天充值返利活动开始了哦~\"</p></blockquote>\n<blockquote><p>\"新版本上线，首充双倍返利！\"</p></blockquote>\n\n<p>换位思考一下：你刚加了一个人，他上来就给你推销保险，你的第一反应是什么？</p>\n\n<p><strong>删掉。拉黑。</strong></p>\n\n<p>私域运营的核心资产是什么？<strong>不是好友数量，是信任关系。</strong></p>\n\n<p>建立信任需要时间：</p>\n\n<li><strong>先给价值</strong>——攻略、独家消息、提前体验资格</li>\n<li><strong>再建关系</strong>——记住玩家的习惯、称呼、偏好</li>\n<li><strong>最后才是变现</strong>——当对方觉得\"这个人懂我\"的时候，推荐自然有效</li>\n\n<p>很多人把私域当成了\"另一个广告渠道\"，这是根本性的认知错误。</p>\n\n<hr/>\n\n<h3>第三层：没互动——只有单向推送，没有双向对话</h3>\n\n<p>看看大多数游戏私域的日常：</p>\n\n<li>早上 9 点：发一条活动公告</li>\n<li>中午 12 点：发一条充值提醒</li>\n<li>晚上 8 点：发一波群发消息</li>\n<li>全天：零互动，零回复</li>\n\n<p>这不叫私域，这叫<strong>电子传单</strong>。</p>\n\n<p>真正的私域运营是什么样的？</p>\n\n<table><thead><tr>\n<th>单向推送（错误做法）</th>\n<th>双向互动（正确做法）</th>\n</tr></thead><tbody>\n<tr>\n<td>群发统一文案</td>\n<td>1v1 针对性沟通</td>\n</tr>\n<tr>\n<td>只说不听</td>\n<td>问玩家意见、收集反馈</td>\n</tr>\n<tr>\n<td>机械式打卡</td>\n<td>记住每个人的特点</td>\n</tr>\n<tr>\n<td>推销导向</td>\n<td>服务导向</td>\n</tr>\n</tbody></table>\n\n<p>有个做得很好的案例：某游戏的大 R 专属客服——不是群发广告，而是每天主动问一句\"昨天打得怎么样？有没有遇到 bug？\"。</p>\n\n<p>看似闲聊，实际上在做两件事：</p>\n\n<li><strong>维系情感连接</strong>——让大 R 觉得\"有人在乎我\"</li>\n<li><strong>捕捉消费信号</strong>——从聊天中了解玩家当前的需求和痛点</li>\n\n<p>这种 1v1 的管家式运营，转化率是群发的 <strong>10 倍以上</strong>。</p>\n\n<hr/>\n\n<h3>第四层：没闭环——想赚钱但不知道怎么赚</h3>\n\n<p>最后一个也是最致命的问题：很多团队做了私域，但<strong>从来没有设计过清晰的变现路径</strong>。</p>\n\n<p>他们的情况通常是：</p>\n\n<blockquote><p>\"先把人加进来，以后总能想到办法变现吧。\"</p></blockquote>\n\n<p>然后呢？就没有然后了。</p>\n\n<p>私域变现需要有明确的路径设计：</p>\n\n<pre><code>\n筛选高价值用户 → 建立信任关系 → 持续提供价值 → \n识别消费时机 → 精准推荐匹配需求的产品 → 完成交易 → 收集反馈 → 循环\n</code></pre>\n\n<p>每一步都要有具体的方法论和执行标准：</p>\n\n<table><thead><tr>\n<th>阶段</th>\n<th>关键动作</th>\n<th>衡量指标</th>\n</tr></thead><tbody>\n<tr>\n<td>筛选</td>\n<td>设定入圈门槛（如累计充值 ≥ X 元）</td>\n<td>入圈人数 / 总好友数</td>\n</tr>\n<tr>\n<td>信任</td>\n<td>定期 1v1 沟通频率、内容打开率</td>\n<td>回复率 / 对话轮次</td>\n</tr>\n<tr>\n<td>价值</td>\n<td>提供独占信息 / 提前体验 / 专属福利</td>\n<td>内容互动率</td>\n</tr>\n<tr>\n<td>变现</td>\n<td>在合适的时机推送匹配需求的offer</td>\n<td>转化率 / ARPU</td>\n</tr>\n<tr>\n<td>反馈</td>\n<td>交易后回访、满意度调研</td>\n<td>复购率 / NPS</td>\n</tr>\n</tbody></table>\n\n<p><strong>没有这套闭环，私域就是一个\"热闹但没有产出\"的黑洞。</strong></p>\n\n<hr/>\n\n<h3>总结</h3>\n\n<p>游戏私域加了几万好友却赚不到钱，不是因为私域不行，而是因为<strong>大部分团队把私域做成了\"低配版短信群发\"</strong>：</p>\n\n<li>❌ 来者不拒不加筛选</li>\n<li>❌ 刚加上就推广告不建信任</li>\n<li>❌ 只会群发不会 1v1 互动</li>\n<li>❌ 没有设计变现闭环</li>\n\n<p>私域的真正力量在于：<strong>用少量但精准的关系，创造远超大规模流量投放的价值。</strong></p>\n\n<p>关键不是你有多少好友，而是你和多少好友之间有<strong>真实的关系</strong>。</p>\n\n<hr/>\n\n<h3>产品经理能学到什么？</h3>\n\n<li><strong>筛选 > 数量</strong>：100 个精准用户的价值 > 10000 个泛流量</li>\n<li><strong>信任是货币</strong>：在私域里，信任比任何营销技巧都值钱</li>\n<li><strong>互动即数据</strong>：每一次双向对话都在告诉你用户的真实需求</li>\n<li><strong>闭环思维</strong>：任何商业动作都要有清晰的\"投入→产出→反馈→优化\"路径</li>\n\n<hr/>\n\n<p><em>下期预告：为什么游戏公司要把玩家分成大R、中R、小R、免费玩家？</em></p>",

    "html_body": "<h1>每日一个为什么 · 第 2 期</h1>\n\n<h2>问题</h2>\n\n<p><strong>为什么游戏公司要把玩家分成「大 R、中 R、小 R、免费玩家」，而不是用同一套活动服务所有人？</strong></p>\n\n<hr/>\n\n<h2>答案</h2>\n\n<h3>一句话总结</h3>\n\n<blockquote><p>因为不同玩家的「价值、需求、敏感点」完全不一样，一视同仁反而是对所有人的不公平。</p></blockquote>\n\n<h3>用个生活中的例子</h3>\n\n<p>想象一家餐厅：</p>\n\n<li>有人只点一份盖饭，追求吃饱就行；</li>\n<li>有人点套餐，想性价比高、吃得丰富；</li>\n<li>有人点海鲜和私厨，要的是面子、服务和稀缺体验。</li>\n\n<p>如果餐厅给所有人都发「消费满 500 送茅台」的券，盖饭顾客用不上，土豪顾客觉得掉价——两边都得罪了。</p>\n\n<p>游戏公司面对的也是这样的用户光谱。只不过餐厅的「消费金额」换成了游戏里的「充值额度」，R 就是人民币（Renminbi）的缩写：</p>\n\n<table><thead><tr>\n<th>层级</th>\n<th>大致月充值范围</th>\n<th>特征</th>\n</tr></thead><tbody>\n<tr>\n<td>免费玩家</td>\n<td>0 元</td>\n<td>人多、活跃、贡献气氛</td>\n</tr>\n<tr>\n<td>小 R</td>\n<td>几块到几十元</td>\n<td>对价格敏感，愿意为小确幸付费</td>\n</tr>\n<tr>\n<td>中 R</td>\n<td>几百到几千元</td>\n<td>追求成长效率和性价比</td>\n</tr>\n<tr>\n<td>大 R</td>\n<td>万元以上</td>\n<td>要身份、要领先、要专属服务</td>\n</tr>\n</tbody></table>\n\n<blockquote><p>注意：这个分层不是鄙视链，而是<strong>运营策略</strong>。</p></blockquote>\n\n<h3>为什么要分层？四个核心原因</h3>\n\n<h4>1. 付费能力不同，不能硬塞同一个价格</h4>\n\n<p>一个小 R 玩家可能每个月在游戏上的预算只有 30 块，你给他推 648 元礼包，他会直接关闭支付界面，还觉得游戏「逼氪」。</p>\n\n<p>反过来，大 R 玩家可能一次活动充几万，你总给他推 6 元首充，他会觉得这个游戏「不懂我」。</p>\n\n<p><strong>产品经理思维</strong>：价格不是成本决定的，而是用户「心理账户」决定的。每个人心里都有一本小账，给不同预算的人匹配不同价格带，才能提高整体转化。</p>\n\n<h4>2. 需求不同：有人要爽，有人要省，有人要社交</h4>\n\n<li><strong>免费玩家</strong>：主要靠时间换资源，喜欢公平、可肝、能白嫖；</li>\n<li><strong>小 R</strong>：愿意花小钱换 convenience（月卡、通行证、小礼包）；</li>\n<li><strong>中 R</strong>：追求效率，想要「比平民强，但花的钱有性价比」；</li>\n<li><strong>大 R</strong>：追求顶端体验、稀缺称号、专属客服、服务器地位。</li>\n\n<p>同一套活动很难同时满足这些需求。比如「充值返元宝」对大 R 没吸引力，对免费玩家却够不着门槛。</p>\n\n<h4>3. 敏感度不同：免费玩家怕「不公平」，大 R 怕「不够特殊」</h4>\n\n<li>免费玩家最敏感的是「付费会不会破坏公平」，如果游戏太逼氪，他们会流失；</li>\n<li>大 R 最敏感的是「我花钱能不能买到别人买不到的东西」，如果人人一样，他就不愿意花大钱。</li>\n\n<p>所以好游戏的商业化设计通常是：<strong>免费玩家能玩，小 R 能舒服，中 R 能成长，大 R 能装逼</strong>。每个层级都觉得自己「赚到了」。</p>\n\n<h4>4. 资源有限，必须把钱花在刀刃上</h4>\n\n<p>运营的人力、预算、服务器资源都是有限的。如果给所有玩家都配 1v1 客服，公司会破产；但如果只给大 R 配专属服务，成本可控，还能提升高价值用户留存。</p>\n\n<p>这其实是<strong>帕累托法则（二八定律）</strong>：20% 的用户贡献 80% 的收入。游戏运营必须优先服务好这 20%。</p>\n\n<h3>不同层级的典型运营策略</h3>\n\n<table><thead><tr>\n<th>玩家层级</th>\n<th>运营重点</th>\n<th>常见手段</th>\n</tr></thead><tbody>\n<tr>\n<td>免费玩家</td>\n<td>活跃、氛围、潜在转化</td>\n<td>签到、任务、UGC 活动、社区氛围</td>\n</tr>\n<tr>\n<td>小 R</td>\n<td>培养付费习惯</td>\n<td>首充、月卡、低价礼包、战令</td>\n</tr>\n<tr>\n<td>中 R</td>\n<td>提升 ARPU（每用户平均收入）</td>\n<td>成长基金、限时累充、性价比礼包</td>\n</tr>\n<tr>\n<td>大 R</td>\n<td>尊享服务、身份认同</td>\n<td>专属客服、线下活动、限定称号、提前体验</td>\n</tr>\n</tbody></table>\n\n<h3>一个常见误区</h3>\n\n<blockquote><p>「只服务大 R 就行了，免费玩家反正不花钱。」</p></blockquote>\n\n<p>这是错的。免费玩家虽然自己不付费，但他们：</p>\n\n<li>是大 R 的「游戏体验」的一部分（PVP、社交、公会战都需要人）；</li>\n<li>会在社区产出攻略、二创、口碑；</li>\n<li>未来可能变成小 R 或中 R。</li>\n\n<p>没有免费玩家，大 R 也没地方展示优越感。所以运营分层不是「抛弃底层」，而是「给每个人合适的位置」。</p>\n\n<h3>产品经理能学到什么？</h3>\n\n<p>分层运营背后是三个产品思维：</p>\n\n<li><strong>用户细分</strong>：不要幻想一个功能讨好所有人；</li>\n<li><strong>ROI 意识</strong>：把有限资源投向最高价值的地方；</li>\n<li><strong>生态思维</strong>：产品是一个系统，不同用户互相成就。</li>\n\n<h3>总结</h3>\n\n<p>游戏公司把玩家分成大 R、中 R、小 R、免费玩家，不是势利眼，而是因为<strong>不同玩家需要不同的价值交换方式</strong>。好的分层运营让每个人都觉得自己被善待：免费玩家有乐趣，小 R 有性价比，中 R 有成长，大 R 有尊贵感。这才是游戏长期赚钱的底层逻辑。</p>",

    "question": "为什么很多游戏明明口碑很好、玩家评价很高，但就是赚不到钱，甚至最后关服了？",

    "html_body": "<h1>每日一个为什么 · 第 3 期</h1>\n\n<h2>问题</h2>\n\n<p><strong>为什么很多游戏明明口碑很好、玩家评价很高，但就是赚不到钱，甚至最后关服了？</strong></p>\n\n<hr/>\n\n<h2>答案</h2>\n\n<h3>一句话总结</h3>\n\n<blockquote><p>因为\"叫好\"和\"叫座\"是两个完全不同的能力——玩家爱玩的东西，跟玩家愿意掏钱的东西，往往是两码事。</p></blockquote>\n\n<h3>先看一个真实场景</h3>\n\n<p>你玩过那种\"良心游戏\"吗？不逼氪、不抽卡、不卖数值、全靠技术和肝，社区一片赞美：</p>\n\n<blockquote><p>\"终于有一款国产良心了！\"</p></blockquote>\n<blockquote><p>\"策划是人！\"</p></blockquote>\n<blockquote><p>\"TapTap 9.5 分！\"</p></blockquote>\n\n<p>然后过了一年——<strong>停服公告</strong>。</p>\n\n<p>评论区瞬间反转：</p>\n\n<blockquote><p>\"这么好的游戏为什么没人充钱啊？\"</p></blockquote>\n<blockquote><p>\"中国玩家配不上好游戏。\"</p></blockquote>\n\n<p>这个场景不是段子，国内游戏行业每年都在上演。</p>\n\n<h3>口碑好但赚不到钱的五层原因</h3>\n\n<h4>第一层：免费玩家 ≠ 付费玩家，评价权 ≠ 消费权</h4>\n\n<p>这是最反直觉的一点——</p>\n\n<p><strong>在 TapTap 给你打 5 星的人，可能一分钱都没充过。</strong></p>\n\n<p>游戏的评价主要来自两类人：免费玩家和小 R。他们数量庞大、表达欲强、对价格极其敏感。他们喜欢的标准是\"能不能白嫖\"——只要够肝就能拿到，那就是好游戏。</p>\n\n<p>而真正付费的大 R 呢？他们很少去 TapTap 发长评。他们直接充值、找客服、加 VIP 群。</p>\n\n<p>所以出现了一个荒诞的分裂：</p>\n\n<table><thead><tr>\n<th>视角</th>\n<th>看法</th>\n<th>行动</th>\n</tr></thead><tbody>\n<tr>\n<td>玩家社区</td>\n<td>\"这游戏太良心了！\"</td>\n<td>不付钱</td>\n</tr>\n<tr>\n<td>大 R 玩家</td>\n<td>\"没什么值得买的\"</td>\n<td>流失</td>\n</tr>\n<tr>\n<td>运营团队</td>\n<td>\"口碑数据好但收入断崖\"</td>\n<td>砍预算 → 裁员 → 停服</td>\n</tr>\n</tbody></table>\n\n<p><strong>口碑数据代表\"声量\"，不代表\"消费意愿\"。</strong></p>\n\n<h4>第二层：良心 ≠ 可持续，商业上\"太良心\"可能是自杀</h4>\n\n<p>很多策划出于理想主义，把商业化做得极度克制：</p>\n\n<li>不卖数值 → 大 R 没东西买</li>\n<li>不抽卡 → 没有冲动消费场景</li>\n<li>外观全部免费 → 没有身份炫耀出口</li>\n<li>所有东西都能肝 → 付费的价值感崩塌</li>\n\n<p>结果呢？付费率可能只有 1-2%，ARPU（每用户平均收入）不到 5 块。</p>\n\n<p>而一款正常运营的手游，服务器成本、研发工资、推广费用，每个月少说几十万。付费率 1-2% 的纯口碑型游戏，连服务器钱都付不起。</p>\n\n<p><strong>口碑好 ≠ 商业可持续。</strong> 就像一家餐厅，菜好吃、环境好、价格便宜——但翻台率上不去、客单价不够，最后还是要关门。</p>\n\n<h4>第三层：定价的心理悖论——玩家\"口头说愿意付\"和\"真的付\"是两回事</h4>\n\n<p>每次有游戏停服，评论区都会有人说：</p>\n\n<blockquote><p>\"出个买断制啊，我愿意花 68 块！\"</p></blockquote>\n<blockquote><p>\"做成 30 块月卡我就充！\"</p></blockquote>\n\n<p>但真出了买断制，转化率可能不到 1%。因为游戏行业有个残酷的数据规律：</p>\n\n<p><strong>口头付费意愿 × 实际执行力 = 实际付费行为。这个折损率通常在 90% 以上。</strong></p>\n\n<p>一百个人说\"我愿意付费\"，最后真正掏钱的可能不到十个。这不是玩家虚伪，而是人的天性——<strong>我们高估自己的消费意愿，这是所有消费品领域都存在的认知偏差。</strong></p>\n\n<h4>第四层：口碑传播 ≠ 用户增长，好口碑换不来好买量</h4>\n\n<p>很多开发者的幻想：</p>\n\n<blockquote><p>\"只要游戏品质够好，口碑自然传播，用户就来了。\"</p></blockquote>\n\n<p>现实是：在今天的游戏市场里——</p>\n\n<li>纯靠口碑自然增长，DAU 天花板大约 2-3 万；</li>\n<li>要突破这个天花板，必须买量（在抖音、快手等平台投广告）；</li>\n<li>买量一个用户成本 30-100 元不等，而口碑型游戏付费率低、LTV（用户生命周期价值）小，根本买不起。</li>\n\n<p>这就形成了一个死循环：口碑好 → 不赚钱 → 买不起量 → 用户不增长 → 更不赚钱。在现在这个获客成本高企的环境里，\"酒香不怕巷子深\"几乎是幻想。</p>\n\n<h4>第五层：好游戏不一定有好运营，设计能力和运营能力是两台不同的发动机</h4>\n\n<p>有些游戏设计得很好玩，但运营完全是灾难：</p>\n\n<li>活动节奏乱——有时一周三个活动，有时两个月没动静；</li>\n<li>社群运营缺席——官方 Q 群全是广告没人管；</li>\n<li>客服响应慢——玩家遇到 BUG 三天没人理；</li>\n<li>没有私域沉淀——玩家流失后完全无法触达召回。</li>\n\n<p><strong>游戏研发是把产品做出来，游戏运营是让产品活下去。</strong> 两个岗位的能力模型完全不同。好游戏被烂运营拖死，远比被烂口碑拖死常见。</p>\n\n<h3>那是不是说\"游戏就不该做好口碑\"？</h3>\n\n<p>绝对不是。这里要分清楚——</p>\n\n<p><strong>好口碑 ≠ 不赚钱。好口碑 + 合理的商业化设计 = 可持续的好产品。</strong></p>\n\n<p>两者的区别在于：</p>\n\n<table><thead><tr>\n<th>纯口碑型</th>\n<th>口碑商业平衡型</th>\n</tr></thead><tbody>\n<tr>\n<td>核心思路</td>\n<td>极致良心，怕赚玩家钱</td>\n<td>让愿意花钱的人有地方花</td>\n</tr>\n<tr>\n<td>商业化</td>\n<td>几乎不做</td>\n<td><strong>分层设计</strong>：免费可玩 → 小付费舒适 → 大付费尊享</td>\n</tr>\n<tr>\n<td>免费玩家体验</td>\n<td>好</td>\n<td>好（靠肝也能获得大部分内容）</td>\n</tr>\n<tr>\n<td>付费玩家体验</td>\n<td>没东西买</td>\n<td>有专属外观/便利/服务/身份</td>\n</tr>\n<tr>\n<td>结果</td>\n<td>高口碑 → 低付费 → 养不起 → 关服</td>\n<td>高口碑 → 可持续收入 → 持续更新 → 越来越好</td>\n</tr>\n</tbody></table>\n\n<p><strong>真正好的商业化设计，不是赚所有玩家的钱，而是让愿意付费的人心甘情愿地付费，同时让不愿意付费的人也能玩得开心。</strong></p>\n\n<p>正如我们上一期讲的分层运营——免费玩家和大 R 需要的是完全不同的东西。</p>\n\n<h3>产品经理能学到什么？</h3>\n\n<li><strong>评价不等于价值</strong>：用户嘴上说什么，和用户实际做什么，要分开看。看数据，别看评论。</li>\n<li><strong>可持续性设计</strong>：产品必须是商业上可持续的，否则再好的初衷也会变成\"关服公告\"。</li>\n<li><strong>不要憎恨商业化</strong>：商业化不是罪恶，它是让好产品能活下去的燃料。健康的商业化是用户价值的一部分。</li>\n<li><strong>平衡 > 极端</strong>：极致良心和极致逼氪，两个极端都走不长远。长期成功的产品永远是找到了那个平衡点。</li>\n\n<h3>总结</h3>\n\n<p>好游戏赚不到钱，不是中国玩家\"不配\"，也不是开发者\"不够努力\"。它背后是一个很朴素的产品逻辑：<strong>免费玩家用评价表达认同，付费玩家用消费表达认同——两者服务的是同一个产品的两面，但商业模式必须建立在付费那面上。</strong></p>\n\n<p>口碑是游戏的血压，太高或太低都不行；商业化设计则是心脏——光有血压没有心跳，人活不了。</p>\n\n<hr/>\n\n<p><em>下期预告？明天见。</em></p>",

    (function(card){
      card.onclick = function() {
        showArticle(card.getAttribute("data-id"));
      };
    })(cards[c]);
  }
}

function showArticle(id) {
  var item = null;
  for (var i = 0; i < ARTICLES.length; i++) {
    if (ARTICLES[i].id === id) { item = ARTICLES[i]; break; }
  }
  if (!item) return;
  document.title = "\u7b2c " + (item.issue || "?") + " \u671f \u00b7 " + (item.question || item.title);
  avMeta.textContent = "\u7b2c " + (item.issue || "?") + " \u671f" + (item.date ? " \u00b7 " + item.date : "");

  // 直接使用构建时预渲染的 HTML，不需要任何运行时渲染库！
  avContent.innerHTML = item.html_body || "";

  function pb(l, tgtId) {
    if (!tgtId) return '<a class="disabled"><span class="lbl">' + l + '</span></a>';
    var t = null;
    for (var j = 0; j < ARTICLES.length; j++) {
      if (ARTICLES[j].id === tgtId) { t = ARTICLES[j]; break; }
    }
    var q = t ? (t.question || t.title) : "";
    return '<a href="#" onclick="showArticle(\'' + tgtId + '\');return false;"><span class="lbl">' + l + '</span>' + esc(q) + '</a>';
  }
  avPager.innerHTML = pb("\u4e0a\u4e00\u671f", item.prev) + pb("\u4e0b\u4e00\u671f", item.next);

  listEl.style.display = "none";
  if (tagBarEl) tagBarEl.style.display = "none";
  avEl.style.display = "";
  window.scrollTo(0, 0);
}

function showList() {
  avEl.style.display = "none";
  listEl.style.display = "";
  if (tagBarEl) tagBarEl.style.display = "";
  window.scrollTo(0, 0);
  document.title = "\u6bcf\u65e5\u4e00\u4e2a\u4e3a\u4ec0\u4e48";
}

// 标签栏
if (ALL_TAGS && ALL_TAGS.length > 0) {
  var allT = document.createElement("span");
  allT.className = "tag active";
  allT.textContent = "\u5168\u90e8";
  allT.onclick = function() {
    activeTag = null;
    var children = tagBarEl.children;
    for (var ci = 0; ci < children.length; ci++) children[ci].className = "tag";
    allT.className = "tag active";
    renderList(searchEl.value);
  };
  tagBarEl.appendChild(allT);
  for (var ti = 0; ti < ALL_TAGS.length; ti++) {
    (function(tagName){
      var el = document.createElement("span");
      el.className = "tag";
      el.textContent = tagName;
      el.onclick = function() {
        activeTag = tagName;
        var children = tagBarEl.children;
        for (var ci = 0; ci < children.length; ci++) children[ci].className = "tag";
        el.className = "tag active";
        renderList(searchEl.value);
      };
      tagBarEl.appendChild(el);
    })(ALL_TAGS[ti]);
  }
}

if (searchEl) searchEl.oninput = function() { renderList(this.value); };

// 初始渲染
renderList("");

})();
</script>
